<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-box">
        <p class="result">Make your move 👇</p>
        <p>Rock Paper Scissor</p>
        <button onclick="rockChoosen();
    statData();">
            Rock
        </button>
        <button onclick="paperChoosen();
    statData();">
            Paper
        </button>
        <button onclick="scissorsChoosen();
    statData();">
            Scissors
        </button>
        <script src="script.js"></script>

        <p>Your Stats in this Game is below : </p>
        <p class="stats">
            Please play atleast one time
        </p>

        <p>
            Want to reset Game !!! huh ??
            Click on the button --
            <button
                onclick="won=0; lost=0; tied=0; statData(); document.querySelector('.result').innerText='Game reset. Play again 👇';">
                Reset
            </button>

        </p>
    </div>
</body>

</html>
